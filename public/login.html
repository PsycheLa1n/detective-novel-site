<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 推理小说检索网</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🔍</span> 推理小说检索网
      </a>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="/search.html">小说检索</a>
        <a href="/#message-board">留言板</a>
      </div>
      <div class="nav-user" id="user-area">
        <a href="/login.html" class="btn btn-outline btn-sm">登录</a>
      </div>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-card">
      <div class="login-icon">🕵️</div>
      <h1>欢迎回来</h1>
      <p class="login-hint">登录后可使用留言板功能<br>默认账号：<strong>user</strong> / 密码：<strong>password</strong></p>

      <div class="form-error" id="login-error">用户名或密码错误</div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" value="user" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" value="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:0.75rem;margin-top:0.5rem">
          登 录
        </button>
      </form>

      <p style="margin-top:1.5rem;font-size:0.82rem;color:var(--text-muted)">
        还没有账号？暂时仅支持默认账号登录
      </p>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
